version: "3.9"

services:
  inference-api:
    build:
      context: ./inference-api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MODEL_PATH=models/classifier.onnx
    volumes:
      - ./inference-api/models:/app/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Phase 3: Observability
  prometheus:
    image: prom/prometheus:v2.52.0
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    profiles: ["observability"]

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3000:3000"
    volumes:
      - ./observability/grafana:/var/lib/grafana/dashboards
    profiles: ["observability"]

  # Phase 4: Experiment Tracker
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: infergrid
      POSTGRES_USER: infergrid
      POSTGRES_PASSWORD: infergrid_dev
    ports:
      - "5432:5432"
    profiles: ["experiment-tracker"]

  # Phase 5: Async Queue
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    profiles: ["async-queue"]

  kafka:
    image: bitnami/kafka:3.7
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
    profiles: ["async-queue"]